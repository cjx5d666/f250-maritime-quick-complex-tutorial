  label: 'quick complex reset: sparse mid-flight obstacle route'
  route_note: 'Tight hard-requirement geometry pass: H/O3/O4 define the reference
    line; P1/P3 lie on it at equal behind-distance; P2/P4 are mirrored near-tangent
    ahead/offset points close to O3/O4; white-bridge midspan mesh tangent defines
    the parallel direction; W1-W4 and P5/P6 follow that tangent; P5/P6 sit on the
    narrowed centered corridor line with projections matching W1/W4; wind cloud boxes
    are hidden on normal review maps but retained for clearance checks; P7/P8 remain
    on the red-bridge normal and P8 lies on S2.'
